{% extends "base.html" %}

{% block title %}Vaihda salasana{% endblock %}

{% block content %}
<div class="card" style="max-width:560px; margin:0 auto;">
    <h2>Vaihda salasana</h2>

    {% if token_valid %}
        <form method="POST">
            <label for="password">Uusi salasana</label>
            <input id="password" name="password" type="password" required>

            <label for="password2" style="margin-top:14px;">Uusi salasana uudelleen</label>
            <input id="password2" name="password2" type="password" required>

            <button class="btn" type="submit" style="margin-top:16px;">Vaihda salasana</button>
        </form>
    {% endif %}

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success">{{ success }}</div>
        <div style="margin-top:16px;">
            <a class="btn" href="{{ url_for('login') }}">Siirry kirjautumiseen</a>
        </div>
    {% endif %}
</div>
{% endblock %}
