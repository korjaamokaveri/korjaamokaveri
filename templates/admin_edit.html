{% extends "base.html" %}

{% block title %}Muokkaa DTC:tä{% endblock %}

{% block extra_css %}
<style>
    .page-title {
        color: white;
        margin-bottom: 20px;
    }

    .edit-wrap {
        max-width: 760px;
        margin: 0 auto;
    }

    .form-card {
        background: white;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
        color: #334155;
    }

    .form-input,
    .form-textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 16px;
        outline: none;
        transition: 0.2s ease;
    }

    .form-input:focus,
    .form-textarea:focus {
        background: #fff;
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .form-textarea {
        min-height: 130px;
        resize: vertical;
    }

    .action-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
    }

    .error {
        margin-top: 18px;
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
        border-radius: 16px;
        padding: 14px 16px;
        font-weight: 600;
    }

    .success {
        margin-top: 18px;
        background: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
        border-radius: 16px;
        padding: 14px 16px;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-wrap">
    <h1 class="page-title">Muokkaa DTC:tä</h1>

    <div class="form-card">
        <form method="POST">
            <div class="form-group">
                <label for="code">DTC</label>
                <input id="code" name="code" class="form-input" value="{{ item.code }}" required>
            </div>

            <div class="form-group">
                <label for="make">Merkki</label>
                <input
                    id="make"
                    name="make"
                    class="form-input"
                    value="{{ item.make if item.make else 'Yleinen' }}"
                    placeholder="Esim. Volvo, BMW, Toyota tai Yleinen"
                >
            </div>

            <div class="form-group">
                <label for="title">Otsikko</label>
                <input id="title" name="title" class="form-input" value="{{ item.title }}" required>
            </div>

            <div class="form-group">
                <label for="description">Kuvaus</label>
                <textarea id="description" name="description" class="form-textarea" required>{{ item.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="problem_symptoms">Tunnetut oireet</label>
                <textarea id="problem_symptoms" name="problem_symptoms" class="form-textarea">{{ item.problem_symptoms }}</textarea>
            </div>

            <div class="form-group">
                <label for="mil_status">MIL-status (vikavalo)</label>
                <input id="mil_status" name="mil_status" class="form-input" value="{{ item.mil_status }}">
            </div>

            <div class="form-group">
                <label for="fail_safe_function">Fail-safe function</label>
                <textarea id="fail_safe_function" name="fail_safe_function" class="form-textarea">{{ item.fail_safe_function }}</textarea>
            </div>

            <div class="form-group">
                <label for="priority">Prioriteetti</label>
                <input id="priority" name="priority" class="form-input" value="{{ item.priority }}">
            </div>

            <div class="form-group">
                <label for="sae_code">SAE-koodi</label>
                <input id="sae_code" name="sae_code" class="form-input" value="{{ item.sae_code }}">
            </div>

            <div class="form-group">
                <label for="causes">Syyt (yksi per rivi)</label>
                <textarea id="causes" name="causes" class="form-textarea">{{ item.causes_text }}</textarea>
            </div>

            <div class="form-group">
                <label for="steps">Testausvaiheet (yksi per rivi)</label>
                <textarea id="steps" name="steps" class="form-textarea">{{ item.steps_text }}</textarea>
            </div>

            <div class="action-row">
                <button type="submit" class="btn">Tallenna muutokset</button>
                <a href="{{ url_for('admin.admin') }}" class="btn-secondary">Takaisin DTC-kirjastoon</a>
            </div>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}
    </div>
</div>
{% endblock %}
