{% extends "base.html" %}

{% block title %}Muokkaa käyttäjää{% endblock %}

{% block content %}
<div style="max-width:900px; margin:40px auto; background:white; color:#0f172a; padding:28px; border-radius:24px;">

    <h1>Muokkaa käyttäjää</h1>

    {% if success %}
        <div style="background:#dcfce7; color:#166534; padding:12px; border-radius:12px; margin-bottom:16px;">
            {{ success }}
        </div>
    {% endif %}

    <p><strong>Sähköposti:</strong> {{ user.email }}</p>

    <form method="POST">
        <input name="full_name" value="{{ user.full_name or '' }}" placeholder="Nimi">
        <input name="phone" value="{{ user.phone or '' }}" placeholder="Puhelin">
        <input name="address_line1" value="{{ user.address_line1 or '' }}" placeholder="Osoite">
        <input name="postal_code" value="{{ user.postal_code or '' }}" placeholder="Postinumero">
        <input name="city" value="{{ user.city or '' }}" placeholder="Kaupunki">
        <input name="country" value="{{ user.country or '' }}" placeholder="Maa">

        <select name="customer_type">
            <option value="private" {% if user.customer_type == "private" %}selected{% endif %}>Yksityinen</option>
            <option value="company" {% if user.customer_type == "company" %}selected{% endif %}>Yritys</option>
        </select>

        <input name="company_name" value="{{ user.company_name or '' }}" placeholder="Yrityksen nimi">
        <input name="vat_number" value="{{ user.vat_number or '' }}" placeholder="Y-tunnus / VAT">

        <select name="account_type">
            <option value="basic" {% if user.account_type == "basic" %}selected{% endif %}>Basic</option>
            <option value="test" {% if user.account_type == "test" %}selected{% endif %}>Test</option>
        </select>

        <label style="display:block; margin:16px 0;">
            <input type="checkbox" name="is_admin" value="1" {% if user.is_admin == 1 %}checked{% endif %}>
            Admin
        </label>

        <button class="btn" type="submit">Tallenna</button>
        <a class="btn" href="{{ url_for('admin.admin_users') }}">Takaisin</a>
    </form>

</div>
{% endblock %}
